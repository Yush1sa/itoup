<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Мои заявки')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Мои заявки</h2>
        <a th:href="@{/requests/create}" class="btn btn-primary">Создать заявку</a>
    </div>

    <div th:if="${requests.isEmpty()}" class="alert alert-info">
        У вас пока нет заявок.
    </div>

    <div th:if="${!requests.isEmpty()}">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>№</th>
                <th>ПО</th>
                <th>Аудитории</th>
                <th>Дедлайн</th>
                <th>Статус</th>
                <th>Создана</th>
                <th class="text-center" style="width: 220px">Действия</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="request : ${requests}">
                <td th:text="'REQ-' + ${request.id}"></td>
                <td th:text="${request.softwareName}"></td>
                <td th:text="${request.classrooms}"></td>
                <td th:text="${#temporals.format(request.deadline,'dd.MM.yyyy')}"></td>

                <td>
                    <span th:if="${request.status.name()=='NEW'}" class="badge bg-secondary">Новая</span>
                    <span th:if="${request.status.name()=='ACCEPTED'}" class="badge bg-primary">Принята</span>
                    <span th:if="${request.status.name()=='IN_PROGRESS'}" class="badge bg-warning text-dark">В работе</span>
                    <span th:if="${request.status.name()=='DONE'}" class="badge bg-success">Выполнена</span>
                    <span th:if="${request.status.name()=='REJECTED'}" class="badge bg-danger">Отклонена</span>
                </td>

                <td th:text="${#temporals.format(request.createdAt,'dd.MM.yyyy HH:mm')}"></td>

                <td class="text-center">
                    <div class="d-flex justify-content-center gap-1">

                        <a th:href="@{'/admin/requests/' + ${request.id}}" class="btn btn-sm btn-outline-primary">
                            <i class="fa-solid fa-eye"></i>
                        </a>

                        <form th:if="${request.status.name()=='DONE' || request.status.name()=='REJECTED'}"
                              th:action="@{'/requests/' + ${request.id} + '/delete'}"
                              method="post"
                              onsubmit="return confirm('Удалить заявку?')">
                            <button class="btn btn-sm btn-outline-danger">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </form>

                        <form th:if="${request.status.name()=='NEW'}"
                              th:action="@{'/admin/requests/' + ${request.id} + '/accept'}"
                              method="post">
                            <button class="btn btn-sm btn-primary">Принять</button>
                        </form>

                        <button th:if="${request.status.name()=='NEW'}"
                                class="btn btn-sm btn-danger"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#rejectModal-' + ${request.id}">
                            Отклонить
                        </button>

                        <form th:if="${request.status.name()=='ACCEPTED'}"
                              th:action="@{'/admin/requests/' + ${request.id} + '/start'}"
                              method="post">
                            <button class="btn btn-sm btn-warning">В работу</button>
                        </form>

                        <form th:if="${request.status.name()=='IN_PROGRESS'}"
                              th:action="@{'/admin/requests/' + ${request.id} + '/done'}"
                              method="post">
                            <button class="btn btn-sm btn-success">Завершить</button>
                        </form>

                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Модальные окна вынесены за пределы таблицы -->
<th:block th:each="request : ${requests}">
    <div class="modal fade"
         th:id="'rejectModal-' + ${request.id}"
         tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">
                        Отклонение заявки #<span th:text="${request.id}"></span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <form th:action="@{'/admin/requests/' + ${request.id} + '/reject'}"
                      method="post">
                    <div class="modal-body">
                        <textarea name="reason"
                                  class="form-control"
                                  rows="4"
                                  placeholder="Причина отказа..."
                                  required></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-danger">Отклонить</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</th:block>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
