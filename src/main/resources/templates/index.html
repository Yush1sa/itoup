<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Главная')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <div class="p-5 mb-4 bg-light rounded-3">
        <div class="container-fluid py-5">

            <h1 class="display-5 fw-bold">
                Система обработки заявок
            </h1>

            <p class="col-md-8 fs-5">
                Веб-приложение для обработки заявок
                на установку программного обеспечения.
            </p>

            <a th:href="@{/requests/create}"
               class="btn btn-primary btn-lg">
                Создать заявку
            </a>

        </div>
    </div>

    <div class="row">

        <div class="col-md-6">
            <div class="card mb-4">

                <div class="card-header">
                    Последние заявки
                </div>

                <div class="card-body">

                    <p>
                        Здесь позже будет список последних заявок.
                    </p>

                </div>

            </div>
        </div>

        <div class="col-md-6">
            <div class="card mb-4">

                <div class="card-header">
                    Информация
                </div>

                <div class="card-body">

                    <p>
                        Система IT-отдела университета.
                    </p>

                </div>

            </div>
        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
