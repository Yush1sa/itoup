<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Создание заявки')}"></head>

<body>

      <div th:replace="~{fragments/navbar :: navbar}"></div>

      <div class="container">
            <div class="row justify-content-center">
                  <div class="col-lg-8">
                        <div class="card shadow-sm">
                              <div class="card-header">
                                    <h3 class="mb-0">
                                          Создание заявки
                                    </h3>
                              </div>
                              <div class="card-body">
                                    <form th:action="@{/requests/create}" th:object="${request}" method="post">
                                          <div class="mb-3">

                                                <label class="form-label">
                                                      Название ПО
                                                </label>

                                                <input type="text" th:field="*{softwareName}" class="form-control"
                                                      placeholder="Например: MATLAB" required>
                                          </div>
                                          <div class="mb-3">
                                                <label class="form-label">
                                                      Аудитории
                                                </label>
                                                <input type="text" th:field="*{classrooms}" class="form-control"
                                                      placeholder="Например: A-312, A-313" required>
                                                <div class="form-text">
                                                      Можно указать несколько аудиторий через запятую
                                                </div>
                                          </div>
                                          <div class="mb-3">
                                                <label class="form-label">
                                                      Дедлайн
                                                </label>
                                                <input type="date" th:field="*{deadline}" class="form-control" required>
                                          </div>
                                          <div class="mb-4">
                                                <label class="form-label">
                                                      Дополнительное описание
                                                </label>
                                                <textarea th:field="*{description}" class="form-control" rows="5"
                                                      placeholder="Дополнительная информация...">
                                                </textarea>
                                          </div>

                                          <div class="d-flex justify-content-end gap-2">
                                                <a th:href="@{/}" class="btn btn-outline-secondary">
                                                      Отмена
                                                </a>
                                                <button type="submit" class="btn btn-primary">
                                                      Создать заявку
                                                </button>

                                          </div>

                                    </form>

                              </div>

                        </div>

                  </div>

            </div>

      </div>

      <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
