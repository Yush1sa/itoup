<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Заявка #' + ${request.id})}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <div class="mb-3">
        <a th:href="@{${backUrl}}" class="btn btn-outline-secondary">
            ← Назад
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="mb-0">
                Заявка #<span th:text="${request.id}"></span>
            </h4>
            <span th:if="${request.status.name() == 'NEW'}"
                  class="badge bg-secondary">
                        Новая
                    </span>
            <span th:if="${request.status.name() == 'ACCEPTED'}"
                  class="badge bg-primary">
                        Принята
                    </span>
            <span th:if="${request.status.name() == 'IN_PROGRESS'}"
                  class="badge bg-warning text-dark">
                        В работе
                    </span>
            <span th:if="${request.status.name() == 'DONE'}"
                  class="badge bg-success">
                        Выполнена
                    </span>

            <span th:if="${request.status.name() == 'REJECTED'}"
                  class="badge bg-danger">
                        Отклонена
                    </span>
        </div>

        <div class="card-body">
            <div class="mb-3">
                <strong>ПО:</strong>
                <span th:text="${request.softwareName}"></span>
            </div>
            <div class="mb-3">
                <strong>Аудитории:</strong>
                <span th:text="${request.classrooms}"></span>
            </div>
            <div class="mb-3">
                <strong>Дедлайн:</strong>
                <span th:text="${#temporals.format(request.deadline, 'dd.MM.yyyy')}"></span>
            </div>
            <div class="mb-3">
                <strong>Дата создания:</strong>
                <span th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy HH:mm')}">></span>
            </div>
            <div class="mb-3">
                <strong>Описание:</strong>
                <p th:text="${request.description}"></p>
            </div>
            <div class="mb-3">
                <strong>Создатель:</strong>
                <span th:text="${request.creator != null ? request.creator.fullName : 'Не указан'}"></span>
            </div>
            <div class="mb-3">
                <strong>Email:</strong>
                <span th:text="${request.creator != null ? request.creator.email : 'Не указан'}"></span>
            </div>
            <div th:if="${request.status.name() == 'REJECTED'}"
                 class="alert alert-danger mt-4">
                <div class="d-flex align-items-center mb-2">
                    <strong>Отклонено</strong>
                </div>
                <div class="border rounded p-2 bg-light">
                    <div class="text-muted small mb-1">
                        Причина отказа
                    </div>
                    <div th:text="${request.rejectionReason}">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
