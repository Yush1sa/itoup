<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Мои заявки')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
            Мои заявки
        </h2>
        <a th:href="@{/requests/create}"
           class="btn btn-primary">
            Создать заявку
        </a>
    </div>
    <div th:if="${requests.isEmpty()}"
         class="alert alert-info">

        У вас пока нет заявок.

    </div>
    <div th:if="${!requests.isEmpty()}">

        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>№</th>
                <th>ПО</th>
                <th>Аудитории</th>
                <th>Дедлайн</th>
                <th>Статус</th>
                <th>Создана</th>
                <th class="text-center" style="width: 100px">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="request : ${requests}">
                <td th:text="'REQ-' + ${request.id}"></td>
                <td th:text="${request.softwareName}"></td>
                <td th:text="${request.classrooms}"></td>
                <td th:text="${#temporals.format(request.deadline, 'dd.MM.yyyy')}"></td>

                <td>
                    <span th:if="${request.status.name() == 'NEW'}"
                          class="badge bg-primary">

                        Новая

                    </span>
                    <span th:if="${request.status.name() == 'IN_PROGRESS'}"
                          class="badge bg-warning text-dark">
                        В работе
                    </span>
                    <span th:if="${request.status.name() == 'DONE'}"
                          class="badge bg-success">
                        Выполнена
                    </span>

                    <span th:if="${request.status.name() == 'REJECTED'}"
                          class="badge bg-danger">
                        Отклонена
                    </span>
                </td>
                <td th:text="${#temporals.format(request.createdAt,
                       'dd.MM.yyyy HH:mm')}">
                </td>
                <td class="text-center">
                    <div class="d-flex justify-content-center gap-1">
                        <a th:href="@{'/requests/' + ${request.id}}"
                           class="btn btn-sm btn-outline-primary" title="Открыть">
                            <i class="fa-solid fa-eye"></i>
                        </a>
                        <form th:if="${request.status.name() == 'NEW'}"
                              th:action="@{'/requests/' + ${request.id} + '/delete'}"
                              method="post"
                              onsubmit="return confirm('Удалить эту заявку?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Удалить">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
